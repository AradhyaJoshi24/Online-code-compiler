<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banking Microservices Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>Banking Microservices Demo</h1>
      <p>Gateway UI for account creation, deposit, and transfers.</p>
    </header>

    <section class="panel">
      <h2>Create Account</h2>
      <form id="createAccountForm">
        <label>
          Owner name
          <input id="ownerName" type="text" placeholder="Jane Doe" required />
        </label>
        <label>
          Initial balance
          <input id="initialBalance" type="number" step="0.01" min="0" value="100" />
        </label>
        <button type="submit">Create account</button>
      </form>
    </section>

    <section class="panel">
      <h2>Transfer Funds</h2>
      <form id="transferForm">
        <label>
          From account ID
          <input id="fromAccount" type="text" required />
        </label>
        <label>
          To account ID
          <input id="toAccount" type="text" required />
        </label>
        <label>
          Amount
          <input id="transferAmount" type="number" step="0.01" min="0.01" value="10" required />
        </label>
        <button type="submit">Transfer</button>
      </form>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>Accounts</h2>
        <button id="refreshAccountsBtn">Refresh list</button>
      </div>
      <div id="accountsList" class="accounts-list"></div>
    </section>

    <section class="panel">
      <h2>Status</h2>
      <pre id="statusOutput">Loading services...</pre>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
